name: aqa_events_admin
description: AQA Sports Events Admin App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP & networking
  dio: ^5.8.0+1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.8.1

  # QR / Camera
  mobile_scanner: ^7.0.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2

  # Sharing / export / launch
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  qr_flutter: ^4.1.0

  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
