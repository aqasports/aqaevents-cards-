version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aqa_postgres
    restart: always
    environment:
      POSTGRES_USER: aqa_user
      POSTGRES_PASSWORD: aqa_password
      POSTGRES_DB: aqa_event_card
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
