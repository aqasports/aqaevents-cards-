<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <title>AQA Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0f19;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f3f4f6;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.35);
      animation: pulse 2s ease-in-out infinite;
    }
    .logo-inner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #0b0f19;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 36px;
    }
    .dots {
      display: flex;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3b82f6;
      animation: bounce 1.4s ease-in-out infinite both;
    }
    .dot:nth-child(2) { animation-delay: 0.16s; }
    .dot:nth-child(3) { animation-delay: 0.32s; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(59,130,246,0.35); }
      50%       { box-shadow: 0 0 60px rgba(139,92,246,0.5); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo-ring">
    <div class="logo-inner">
      <span class="logo-text">AQA</span>
    </div>
  </div>
  <h1>AQA Admin</h1>
  <p>Loading admin portal…</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
